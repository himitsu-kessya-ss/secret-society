<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Tactics - ボブの秘密基地</title>
    <style>
        :root {
            --bg-color: #1a1c1e;
            --accent-color: #00d4ff;
            --text-color: #e0e0e0;
            --card-bg: #25282c;
            --border-color: #444;
            --header-total-height: 165px; /* 検索窓を含めた高さ */
        }

        html, body {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color); color: var(--text-color);
            overflow: hidden; font-family: sans-serif;
        }

        /* 上部固定エリア */
        .top-section {
            height: var(--header-total-height);
            background: var(--bg-color);
            border-bottom: 2px solid var(--accent-color);
            padding: 10px 20px; box-sizing: border-box;
            position: relative; z-index: 100;
        }

        .header-flex { display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 5px 0; font-size: 1.4rem; color: var(--accent-color); }
        .back-link { 
            color: var(--text-color); text-decoration: none; font-size: 0.9rem; 
            border: 1px solid var(--text-color); padding: 5px 10px; border-radius: 4px;
        }
        .back-link:hover { background: var(--text-color); color: #000; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn {
            padding: 8px 15px; background: #333; border: none;
            color: var(--text-color); cursor: pointer; border-radius: 4px 4px 0 0;
        }
        .tab-btn.active { background: var(--accent-color); color: #000; font-weight: bold; }

        /* 検索窓 */
        #search-box {
            width: 100%; padding: 10px; background: #222; 
            border: 1px solid var(--accent-color); color: white; border-radius: 4px;
            box-sizing: border-box;
        }

        /* データ表示エリア */
        .main-content {
            height: calc(100% - var(--header-total-height));
            overflow-y: auto; padding: 20px; box-sizing: border-box;
        }

        .info-box {
            background: var(--card-bg);
            padding: 25px;
            border-left: 4px solid var(--accent-color);
            line-height: 1.8;
            white-space: pre-wrap;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* ハイライト用のスタイル */
        .highlight {
            background-color: rgba(0, 212, 255, 0.4); /* 水色の半透明背景 */
            color: #fff;
            font-weight: bold;
            border-radius: 2px;
            padding: 0 2px;
        }
    </style>
</head>
<body>

<header style="background:rgba(0,0,0,0.95); height:60px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:1000; border-bottom:2px solid var(--accent-color); padding:0 15px; box-sizing:border-box;">
    <a href="index.html#main" style="text-decoration:none; font-weight:bold; font-size:1.1rem; color:var(--accent-color); white-space:nowrap; margin-right:15px;">ボブの秘密基地</a>
    
    <nav style="display:flex; gap:10px; overflow-x:auto; white-space:nowrap; -webkit-overflow-scrolling:touch; padding:5px 0;">
        <style>
            .nav-item-custom {
                color: #e0e0e0; text-decoration: none; font-size: 0.85rem; 
                padding: 6px 10px; border-radius: 4px; border: 1px solid transparent;
                transition: 0.2s;
            }
            .nav-item-custom:hover { background: rgba(0, 212, 255, 0.2); border-color: #00d4ff; }
            nav::-webkit-scrollbar { display: none; }
        </style>
        <a href="unit.html" class="nav-item-custom">Unit</a>
        <a href="derivatives.html" class="nav-item-custom">Derivatives</a>
        <a href="arms.html" class="nav-item-custom">Arms</a>
        <a href="hangar.html" class="nav-item-custom">Hangar</a>
        <a href="battle.html" class="nav-item-custom">Battle</a>
        <a href="novels.html" class="nav-item-custom">Novels</a>
        <a href="tactics.html" class="nav-item-custom">Tactics</a>
        <a href="hunter.html" class="nav-item-custom">Hunter</a>
        <a href="trivia.html" class="nav-item-custom">Trivia</a>
        <a href="emoji.html" class="nav-item-custom">Emoji</a>
        <a href="link.html" class="nav-item-custom">Link</a>
    </nav>
</header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('personal')">👤 個人戦術</button>
        <button class="tab-btn" onclick="switchTab('team')">👥 団体戦術</button>
    </div>

    <input type="text" id="search-box" placeholder="キーワードを検索してハイライト..." onkeyup="handleSearch()">
</div>

<div class="main-content">
    <div id="personal" class="tab-content">
        <div class="info-box" id="personal-content">読み込み中...</div>
    </div>
    <div id="team" class="tab-content" style="display:none;">
        <div class="info-box" id="team-content">読み込み中...</div>
    </div>
</div>

<script>
    // 元のテキストを保持するための変数
    let rawData = {
        personal: "",
        team: ""
    };

    async function loadData() {
        try {
            const resP = await fetch('個人戦術.txt');
            rawData.personal = await resP.text();
            document.getElementById('personal-content').innerText = rawData.personal;

            const resT = await fetch('団体戦術.txt');
            rawData.team = await resT.text();
            document.getElementById('team-content').innerText = rawData.team;
        } catch (e) {
            const errorMsg = "エラー：GitHubにアップロードして確認してください。";
            document.getElementById('personal-content').innerText = errorMsg;
        }
    }

    // 検索とハイライトの処理
    function handleSearch() {
        const term = document.getElementById('search-box').value;
        const activeTab = document.querySelector('.tab-content[style*="block"], .tab-content:not([style*="none"])').id;
        const displayElement = document.getElementById(`${activeTab}-content`);
        const originalText = rawData[activeTab];

        if (!term) {
            displayElement.innerText = originalText;
            return;
        }

        // 正規表現でキーワードを検索（エスケープ処理付き）
        const escapedTerm = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const regex = new RegExp(`(${escapedTerm})`, 'gi');
        
        // テキスト内のキーワードを <span class="highlight"> で囲む
        // 注意：innerTextではなくinnerHTMLを更新する
        const highlightedText = originalText.replace(regex, '<span class="highlight">$1</span>');
        displayElement.innerHTML = highlightedText;
    }

    function switchTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).style.display = 'block';
        event.currentTarget.classList.add('active');

        // タブ切り替え時に検索をリセット
        document.getElementById('search-box').value = '';
        handleSearch();
        document.querySelector('.main-content').scrollTop = 0;
    }

    loadData();
</script>
<script data-goatcounter="https://bobs-base.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
