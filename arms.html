<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Arms depot - ボブの秘密基地</title>
    <style>
        :root {
            --bg-color: #1a1c1e;
            --accent-color: #00d4ff;
            --text-color: #e0e0e0;
            --card-bg: #25282c;
            --border-color: #444;
            --header-total-height: 165px; 
        }

        html, body {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color); color: var(--text-color);
            overflow: hidden; font-family: sans-serif;
        }

        /* 上部固定エリア */
        .top-section {
            height: var(--header-total-height);
            background: var(--bg-color);
            border-bottom: 2px solid var(--accent-color);
            padding: 10px 20px; box-sizing: border-box;
            position: relative; z-index: 100;
        }

        /* ヘッダー周り：戻るリンクを追加 */
        .header-flex { display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 5px 0; font-size: 1.4rem; color: var(--accent-color); }
        .back-link { 
            color: var(--text-color); text-decoration: none; font-size: 0.9rem; 
            border: 1px solid var(--text-color); padding: 5px 10px; border-radius: 4px;
        }
        .back-link:hover { background: var(--text-color); color: #000; }
        
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; }
        .tab-btn {
            padding: 8px 15px; background: #333; border: none;
            color: var(--text-color); cursor: pointer; border-radius: 4px 4px 0 0;
        }
        .tab-btn.active { background: var(--accent-color); color: #000; font-weight: bold; }

        .search-area { display: flex; gap: 10px; }
        #search-column {
            padding: 10px; background: #222; border: 1px solid var(--accent-color);
            color: white; border-radius: 4px;
        }
        #search-box {
            flex-grow: 1; padding: 10px; background: #222; 
            border: 1px solid var(--accent-color); color: white; border-radius: 4px;
        }

        .main-content {
            height: calc(100% - var(--header-total-height));
            overflow: auto; padding: 0 20px 20px 20px; box-sizing: border-box;
        }

        table { width: 100%; border-collapse: collapse; background: var(--card-bg); font-size: 0.85rem; min-width: 900px; }
        thead th {
            position: sticky; top: 0; background: #333; color: var(--accent-color); z-index: 50;
            padding: 12px 10px; border: 1px solid var(--border-color); white-space: nowrap; box-shadow: 0 2px 2px rgba(0,0,0,0.5);
        }
        td { border: 1px solid var(--border-color); padding: 10px; white-space: nowrap; }
        tr:nth-child(even) { background-color: #1e2124; }
        tr:hover { background-color: #2c3e50; }

        .info-box { background: #2d3136; padding: 20px; border-left: 4px solid var(--accent-color); line-height: 1.8; white-space: pre-wrap; margin-top: 10px; }
    </style>
</head>
<body>

<header style="background:rgba(0,0,0,0.95); height:60px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:1000; border-bottom:2px solid var(--accent-color); padding:0 15px; box-sizing:border-box;">
    <a href="index.html#main" style="text-decoration:none; font-weight:bold; font-size:1.1rem; color:var(--accent-color); white-space:nowrap; margin-right:15px;">ボブの秘密基地</a>
    
    <nav style="display:flex; gap:10px; overflow-x:auto; white-space:nowrap; -webkit-overflow-scrolling:touch; padding:5px 0;">
        <style>
            .nav-item-custom {
                color: #e0e0e0; text-decoration: none; font-size: 0.85rem; 
                padding: 6px 10px; border-radius: 4px; border: 1px solid transparent;
                transition: 0.2s;
            }
            .nav-item-custom:hover { background: rgba(0, 212, 255, 0.2); border-color: #00d4ff; }
            nav::-webkit-scrollbar { display: none; }
        </style>
        <a href="unit.html" class="nav-item-custom">Unit</a>
        <a href="derivatives.html" class="nav-item-custom">Derivatives</a>
        <a href="arms.html" class="nav-item-custom">Arms</a>
        <a href="hangar.html" class="nav-item-custom">Hangar</a>
        <a href="battle.html" class="nav-item-custom">Battle</a>
        <a href="novels.html" class="nav-item-custom">Novels</a>
        <a href="tactics.html" class="nav-item-custom">Tactics</a>
        <a href="hunter.html" class="nav-item-custom">Hunter</a>
        <a href="trivia.html" class="nav-item-custom">Trivia</a>
        <a href="emoji.html" class="nav-item-custom">Emoji</a>
        <a href="link.html" class="nav-item-custom">Link</a>
    </nav>
</header>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('weapon')">⚔️ 武器一覧</button>
        <button class="tab-btn" onclick="switchTab('equip')">🛡️ 装備一覧</button>
        <button class="tab-btn" onclick="switchTab('system')">⚙️ 独自システム「武器庫」解説</button>
    </div>
    
    <div class="search-area" id="search-wrapper">
        <select id="search-column"></select>
        <input type="text" id="search-box" placeholder="キーワードを入力..." onkeyup="filterData()">
    </div>
</div>

<div class="main-content">
    <div id="weapon" class="tab-content">
        <table>
            <thead><tr id="weapon-head"></tr></thead>
            <tbody id="weapon-body"></tbody>
        </table>
    </div>

    <div id="equip" class="tab-content" style="display:none;">
        <table>
            <thead><tr id="equip-head"></tr></thead>
            <tbody id="equip-body"></tbody>
        </table>
    </div>

    <div id="system" class="tab-content" style="display:none;">
        <div class="info-box" id="system-content">読み込み中...</div>
    </div>
</div>

<script>
    // CSV/TXT 読み込み処理
    async function loadData() {
        try {
            const resW = await fetch('武器一覧.csv');
            const txtW = await resW.text();
            renderTable('weapon', txtW);

            const resE = await fetch('装備一覧.csv');
            const txtE = await resE.text();
            renderTable('equip', txtE);

            const resS = await fetch('武器庫.txt');
            const txtS = await resS.text();
            document.getElementById('system-content').innerText = txtS;

            updateSearchOptions();
        } catch (e) {
            document.getElementById('system-content').innerText = "エラー：GitHubにアップロードして確認してください。";
        }
    }

    function renderTable(type, csvData) {
        const rows = csvData.split(/\r?\n/).filter(row => row.trim() !== '');
        if (rows.length === 0) return;
        
        const headers = rows[0].split(',');
        document.getElementById(`${type}-head`).innerHTML = headers.map(h => `<th>${h}</th>`).join('');
        
        const body = rows.slice(1).map(row => {
            const cols = row.split(',');
            return `<tr>${cols.map(c => `<td>${c}</td>`).join('')}</tr>`;
        }).join('');
        document.getElementById(`${type}-body`).innerHTML = body;
    }

    function switchTab(tabName) {
        document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabName).style.display = 'block';
        event.currentTarget.classList.add('active');
        document.getElementById('search-wrapper').style.visibility = (tabName === 'system') ? 'hidden' : 'visible';
        updateSearchOptions();
        document.getElementById('search-box').value = '';
        filterData();
    }

    function updateSearchOptions() {
        const activeTab = document.querySelector('.tab-content[style*="block"], .tab-content:not([style*="none"])');
        if (!activeTab) return;
        const headers = activeTab.querySelectorAll('th');
        const select = document.getElementById('search-column');
        let options = '<option value="all">すべての項目</option>';
        headers.forEach((th, index) => {
            options += `<option value="${index}">${th.innerText}</option>`;
        });
        select.innerHTML = options;
    }

    function filterData() {
        const input = document.getElementById('search-box').value.toUpperCase();
        const colIndex = document.getElementById('search-column').value;
        const activeTab = document.querySelector('.tab-content[style*="block"], .tab-content:not([style*="none"])');
        const rows = activeTab.querySelectorAll('tbody tr');

        rows.forEach(row => {
            let match = false;
            const cells = row.getElementsByTagName('td');
            if (colIndex === "all") {
                match = row.innerText.toUpperCase().indexOf(input) > -1;
            } else {
                const targetCell = cells[colIndex];
                if (targetCell && targetCell.innerText.toUpperCase().indexOf(input) > -1) match = true;
            }
            row.style.display = match ? "" : "none";
        });
    }

    loadData();
</script>
<script data-goatcounter="https://bobs-base.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
