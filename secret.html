<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ボブの楽屋 🍭</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap');

        :root {
            --bg-color: #fffef5; 
            --text-color: #555;
            --accent-pink: #ff85a1;
            --accent-yellow: #ffe066;
            --accent-blue: #74c0fc;
            --card-bg: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Zen Maru Gothic', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle, #ffdee9 2px, transparent 2px),
                radial-gradient(circle, #e0f2fe 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            overflow-x: hidden; /* 横揺れを防止 */
        }

        /* ★復活：ヘッダーのパステルライン */
        header {
            width: 100%;
            height: 10px;
            background: linear-gradient(to right, var(--accent-pink), var(--accent-yellow), var(--accent-blue));
            position: fixed;
            top: 0;
            z-index: 1000;
        }

        /* ふわふわ動く背景アイテム（重なり防止済） */
        .hobby-item {
            position: fixed; font-size: 2.5rem; z-index: -1; opacity: 0.4;
            pointer-events: none; animation: floating 6s ease-in-out infinite;
        }
        .item-1 { top: 15%; left: 5%; animation-delay: 0s; }
        .item-2 { top: 25%; right: 5%; animation-delay: 1s; }
        .item-3 { bottom: 20%; left: 8%; animation-delay: 2s; }
        .item-4 { bottom: 15%; right: 5%; animation-delay: 3s; }

        @keyframes floating {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        .header-section { text-align: center; margin: 60px 20px 20px 20px; }

        /* ★復活：もこもこ吹き出し */
        .bubble {
            background: #fff;
            border: 4px solid var(--accent-pink); /* ピンクの太枠 */
            padding: 12px 25px;
            border-radius: 50px;
            position: relative;
            display: inline-block;
            font-weight: 900;
            color: var(--text-color);
            box-shadow: 0 6px 0 rgba(255, 133, 161, 0.2);
            font-size: 1rem;
        }
        /* 吹き出しのしっぽ */
        .bubble::after {
            content: '';
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 18px 12px 0;
            border-style: solid;
            border-color: var(--accent-pink) transparent;
        }
        .bubble::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 15px 10px 0;
            border-style: solid;
            border-color: #fff transparent;
            z-index: 1;
        }

        h1 { font-size: 2.8rem; margin-top: 30px; color: var(--text-color); text-shadow: 3px 3px 0 #fff; }

        /* メインエリア（スマホで縦並び、PCで横並び） */
        .main-content {
            display: flex; gap: 25px; justify-content: center; flex-wrap: wrap;
            width: 100%; max-width: 900px; padding: 20px; box-sizing: border-box;
        }

        .room-card {
            background: var(--card-bg);
            border: 3px solid var(--text-color);
            border-radius: 30px;
            padding: 30px 20px;
            width: 300px;
            text-decoration: none;
            color: inherit;
            transition: 0.3s;
            box-shadow: 0 10px 0 var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .room-card:hover { transform: translateY(-5px); box-shadow: 0 15px 0 var(--text-color); background: #fffcf0; }

        @media (max-width: 480px) {
            .room-card { width: 100%; }
            h1 { font-size: 2rem; }
            .hobby-item { font-size: 1.8rem; }
        }

        .icon-box { font-size: 4rem; margin-bottom: 15px; }
        h3 { margin: 10px 0; font-size: 1.5rem; color: var(--text-color); }
        p { font-size: 0.95rem; line-height: 1.6; margin: 0; }

        .back-home {
            margin: 50px 0; text-decoration: none; color: #888; font-weight: bold;
            padding: 12px 24px; border: 3px dashed #ccc; border-radius: 25px; transition: 0.3s;
        }
        .back-home:hover { color: var(--accent-pink); border-color: var(--accent-pink); background: #fff; }
    </style>
</head>
<body>

    <header></header>

    <div class="hobby-item item-1">🎮</div>
    <div class="hobby-item item-2">🎸</div>
    <div class="hobby-item item-3">🎨</div>
    <div class="hobby-item item-4">💿</div>

    <div class="header-section">
        <div class="bubble">ここは、物置みたいなボブの隠し部屋！</div>
        <h1>ボブの楽屋</h1>
    </div>

    <div class="main-content">
        <a href="making.html" class="room-card">
            <div class="icon-box">✨</div>
            <h3>メイキング</h3>
            <p>「秘密基地」ができるまで。<br>
                AIとの愛の共同作業の軌跡！<br>
ジェミさんは難しい事色々言ってますが<br>
ボブの指示だけ見てみるとわかりやすいと思います^^/</p>
        </a>

        <a href="music.html" class="room-card">
            <div class="icon-box">🎵</div>
            <h3>ミュージック</h3>
            <p>AIを使っておふざけで作った<br>楽曲たちです♪</p>
        </a>
    </div>

    <a href="index.html" class="back-home">秘密基地へもどる</a>

</body>
</html>
