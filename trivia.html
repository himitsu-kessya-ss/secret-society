<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Trivia - ボブの秘密基地</title>
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mark.js/8.11.1/jquery.mark.min.js"></script>

    <style>
        :root {
            --bg-color: #1a1c1e;
            --accent-color: #00d4ff;
            --text-color: #e0e0e0;
            --card-bg: #25282c;
            --border-color: #444;
            --header-total-height: 165px;
        }

        html, body {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg-color); color: var(--text-color);
            overflow: hidden; font-family: sans-serif;
        }

        /* 共通ヘッダー */
        header {
            background: rgba(0,0,0,0.95); height: 60px; display: flex; 
            justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 1000; 
            border-bottom: 2px solid var(--accent-color); padding: 0 15px; box-sizing: border-box;
        }

        .nav-item-custom {
            color: #e0e0e0; text-decoration: none; font-size: 0.85rem; 
            padding: 6px 10px; border-radius: 4px; border: 1px solid transparent;
            transition: 0.2s;
        }
        .nav-item-custom:hover { background: rgba(0, 212, 255, 0.2); border-color: #00d4ff; }

        /* 上部固定エリア */
        .top-section {
            background: var(--bg-color);
            border-bottom: 2px solid var(--accent-color);
            padding: 10px 20px 0 20px; box-sizing: border-box;
            z-index: 100;
        }

        .search-area { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        #search-box {
            flex-grow: 1; padding: 10px; background: #222; 
            border: 1px solid var(--accent-color); color: white; border-radius: 4px;
            max-width: 500px;
        }

        /* タブデザイン */
        .tabs-container {
            display: flex; gap: 5px; overflow-x: auto; white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        .tabs-container::-webkit-scrollbar { height: 6px; }
        .tabs-container::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

        .tab-btn {
            padding: 8px 18px; background: #333; border: none;
            color: var(--text-color); cursor: pointer; border-radius: 4px 4px 0 0;
            font-size: 0.85rem; transition: 0.2s;
        }
        .tab-btn.active { background: var(--accent-color); color: #000; font-weight: bold; }

        /* メインコンテンツ */
        .main-content {
            height: calc(100% - 165px);
            overflow-y: auto; padding: 20px; box-sizing: border-box;
            background: var(--bg-color);
        }

        .info-box {
            background: var(--card-bg); padding: 25px; 
            border-left: 4px solid var(--accent-color); 
            line-height: 1.8; white-space: pre-wrap; 
            font-family: "MS Gothic", "Osaka-mono", monospace;
            font-size: 0.95rem; min-height: 100%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        mark { background: #ffeb3b; color: #000; padding: 0 2px; border-radius: 2px; }
    </style>
</head>
<body>

<header>
    <a href="index.html#main" style="text-decoration:none; font-weight:bold; font-size:1.1rem; color:var(--accent-color);">ボブの秘密基地</a>
    <nav style="display:flex; gap:10px; overflow-x:auto;">
        <a href="unit.html" class="nav-item-custom">Unit</a>
        <a href="derivatives.html" class="nav-item-custom">Derivatives</a>
        <a href="arms.html" class="nav-item-custom">Arms</a>
        <a href="hangar.html" class="nav-item-custom">Hangar</a>
        <a href="battle.html" class="nav-item-custom">Battle</a>
        <a href="novels.html" class="nav-item-custom">Novels</a>
        <a href="tactics.html" class="nav-item-custom">Tactics</a>
        <a href="hunter.html" class="nav-item-custom">Hunter</a>
        <a href="trivia.html" class="nav-item-custom">Trivia</a>
        <a href="emoji.html" class="nav-item-custom">Emoji</a>
        <a href="link.html" class="nav-item-custom">Link</a>
    </nav>
</header>

<div class="top-section">
    <div class="search-area">
        <input type="text" id="search-box" placeholder="表示中のテキスト内を検索...">
    </div>
    <div class="tabs-container" id="tabs-container"></div>
</div>

<div class="main-content" id="scroll-container">
    <div id="content-display" class="info-box">読み込み中...</div>
</div>

<script>
$(document).ready(function () {
    const triviaFiles = [
        { name: "遊び方", file: "「MSタクティクスSR」_の遊び方.txt" },
        { name: "Q&A", file: "Q&A（公式転載）.txt" },
        { name: "キャラステータス", file: "キャラステータス.txt" },
        { name: "機体ステータス", file: "機体ステータス.txt" },
        { name: "改造・熟練度", file: "機体カスタマイズ・熟練度.txt" },
        { name: "スキル", file: "スキル.txt" },
        { name: "特性", file: "特性一覧.txt" },
        { name: "地形", file: "地形.txt" },
        { name: "戦闘ダメージ", file: "戦闘ダメージ.txt" },
        { name: "索敵", file: "索敵.txt" },
        { name: "気力", file: "気力.txt" },
        { name: "掃討盤", file: "掃討盤.txt" },
        { name: "豆知識", file: "豆知識.txt" }
    ];

    const $content = $('#content-display');
    const $search = $('#search-box');

    // タブ生成
    triviaFiles.forEach((item) => {
        const $btn = $('<button class="tab-btn"></button>')
            .text(item.name)
            .on('click', function() {
                $('.tab-btn').removeClass('active');
                $(this).addClass('active');
                loadContent(item.file);
            });
        $('#tabs-container').append($btn);
    });

    $('.tab-btn').first().click();

    function loadContent(fileName) {
        $content.text("読み込み中...");
        
        fetch(fileName)
            .then(response => response.arrayBuffer())
            .then(buffer => {
                // 1. まずはUTF-8で試してみる
                let text = new TextDecoder('utf-8').decode(buffer);
                
                // 2. 文字化け特有の記号「」が含まれているかチェック
                // もしくは、明らかに文字化けしている可能性が高い場合にShift-JISで再試行
                if (text.includes('\uFFFD')) {
                    text = new TextDecoder('shift-jis').decode(buffer);
                }
                
                displayContent(text);
            })
            .catch(err => {
                $content.text("エラー: ファイルが読み込めませんでした。");
            });
    }

    function displayContent(text) {
        $content.text(text);
        applyHighlight();
        $('#scroll-container').scrollTop(0);
    }

    $search.on('input', applyHighlight);

    function applyHighlight() {
        const keyword = $search.val();
        $content.unmark().mark(keyword, { "accuracy": "partially" });
    }
});
</script>
<script data-goatcounter="https://bobs-base.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</body>
</html>
